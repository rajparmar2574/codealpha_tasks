{% extends 'store/base.html' %}
{% block title %}Login — LuxeCart{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">✦ LuxeCart</div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Step 1: Sign in to your account</p>

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Enter your username" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem;">
        Sign In →
      </button>
    </form>

    <div style="text-align:center;margin-top:1rem;">
      <small style="color:var(--text2);font-size:0.8rem;">
        🔒 Your information is safe and encrypted
      </small>
    </div>

    <div class="divider"><span>or</span></div>
    <div class="auth-switch">
      New to LuxeCart? <a href="{% url 'register' %}">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
